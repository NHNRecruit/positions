<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NHN Group 中途採用ポジション一覧</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');

:root {
  --bg: #F7F6F3;
  --surface: #FFFFFF;
  --border: #E4E2DC;
  --border-strong: #C8C4BB;
  --text: #1A1916;
  --text-muted: #6B6860;
  --text-faint: #A8A59F;

  --pa: #1B4F8A;   --pa-bg: #EBF2FB;
  --tc: #0D5C45;   --tc-bg: #E4F5EF;
  --jp: #4B3296;   --jp-bg: #EEEAFB;
  --fk: #8B2A12;   --fk-bg: #FBECE6;
  --cl: #255C1A;   --cl-bg: #E8F5E2;

  --tech-c: #1555A0; --tech-bg: #E8F0FA;
  --biz-c:  #2B6B28; --biz-bg:  #E8F5E4;
  --corp-c: #4B3296; --corp-bg: #EEEAFB;
  --des-c:  #8B2563; --des-bg:  #FAEBF3;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

.page-header {
  background: var(--text);
  color: #fff;
  padding: 28px 40px 28px;
}
.page-header h1 {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.4px;
  line-height: 1.2;
  margin-bottom: 10px;
}
.header-desc {
  font-size: 13px;
  color: rgba(255,255,255,0.65);
  line-height: 1.7;
  margin-bottom: 18px;
}
.header-apply-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: #fff;
  border: none;
  color: var(--text);
  font-size: 14px;
  font-weight: 700;
  padding: 12px 28px;
  border-radius: 8px;
  text-decoration: none;
  white-space: nowrap;
  transition: opacity 0.15s, transform 0.15s;
  box-shadow: 0 2px 16px rgba(0,0,0,0.22);
  letter-spacing: 0.1px;
}
.header-apply-btn:hover { opacity: 0.88; transform: translateY(-1px); }

.toolbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 40px;
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}
.toolbar select, .toolbar input[type=text] {
  font-family: inherit;
  font-size: 13px;
  padding: 7px 12px;
  border: 1px solid var(--border-strong);
  border-radius: 6px;
  background: var(--bg);
  color: var(--text);
  height: 36px;
  cursor: pointer;
}
.toolbar input[type=text] { width: 260px; }
.toolbar select:focus, .toolbar input:focus {
  outline: 2px solid var(--text);
  outline-offset: 1px;
}
.result-count {
  margin-left: auto;
  font-size: 11px;
  color: var(--text-muted);
  font-family: 'DM Mono', monospace;
}

.main { padding: 32px 40px 60px; }

.corp-section { margin-bottom: 40px; }
.corp-section:last-child { margin-bottom: 0; }

.corp-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 2px solid var(--text);
}
.corp-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.corp-title { font-size: 15px; font-weight: 700; letter-spacing: -0.2px; }
.corp-count {
  font-size: 11px;
  font-family: 'DM Mono', monospace;
  color: var(--text-muted);
  margin-left: auto;
}

.tbl-wrap {
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  background: var(--surface);
}
table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
}
col.c-grp { width: 78px; }
col.c-pos { width: 180px; }
col.c-emp { width: 70px; }
col.c-req { width: auto; }

thead th {
  background: #F0EEE9;
  font-size: 10px;
  font-weight: 500;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.6px;
  padding: 8px 12px;
  text-align: left;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: #FAFAF8; }
td { padding: 10px 12px; vertical-align: top; }

.badge {
  display: inline-block;
  font-size: 10px;
  font-weight: 500;
  padding: 2px 7px;
  border-radius: 20px;
  white-space: nowrap;
  line-height: 1.6;
}
.b-tech { background: var(--tech-bg); color: var(--tech-c); }
.b-biz  { background: var(--biz-bg);  color: var(--biz-c); }
.b-corp { background: var(--corp-bg); color: var(--corp-c); }
.b-des  { background: var(--des-bg);  color: var(--des-c); }
.b-etc  { background: #F0EEE9; color: var(--text-muted); }

.b-seiin  { background: #F0EEE9; color: var(--text-muted); }
.b-keiyak { background: var(--fk-bg); color: var(--fk); }
.b-jun    { background: #FAEEDA; color: #7A4A08; }

.pos-name {
  font-size: 12.5px;
  font-weight: 500;
  color: var(--text);
  line-height: 1.4;
  word-break: keep-all;
  overflow-wrap: break-word;
}
.pos-name a {
  color: var(--text);
  text-decoration: none;
  border-bottom: 1px solid transparent;
  transition: border-color 0.15s;
}
.pos-name a:hover { border-color: var(--text); }
.pos-series { font-size: 10.5px; color: var(--text-faint); margin-top: 2px; word-break: keep-all; }

.req-text { font-size: 11.5px; color: var(--text-muted); line-height: 1.7; word-break: keep-all; overflow-wrap: break-word; }
.req-text ul { margin: 0; padding-left: 14px; }
.req-text li { margin-bottom: 1px; }
.req-none { font-size: 11px; color: var(--text-faint); }

col.c-detail { width: 100px; }
.detail-cell { text-align: center; vertical-align: middle; padding: 10px 18px; }
.btn-detail {
  display: inline-block;
  font-size: 10.5px;
  font-weight: 600;
  color: var(--text);
  background: var(--bg);
  border: 1px solid var(--border-strong);
  padding: 4px 10px;
  border-radius: 5px;
  text-decoration: none;
  white-space: nowrap;
  transition: background 0.12s, border-color 0.12s;
}
.btn-detail:hover { background: var(--border); border-color: var(--text-muted); }
.btn-detail-none { font-size: 11px; color: var(--text-faint); }
.btn-detail-private { font-size: 10px; color: var(--text-faint); white-space: nowrap; }

.hidden { display: none !important; }
.section-hidden { display: none !important; }

.no-result { text-align: center; padding: 60px 20px; color: var(--text-faint); font-size: 13px; }

@media print {
  .toolbar { display: none; }
  .page-header { padding: 16px 24px; }
  .main { padding: 20px 24px; }
}
</style>
</head>

const GFORM_BASE = 'https://docs.google.com/forms/d/e/1FAIpQLSfYVbB15q14TGlcZLCF_0TnJKB1kMd4VtZYFCw-8cMBj44f7w/viewform';

const GRP_CLS   = {Tech:"b-tech", Business:"b-biz", Corporate:"b-corp", Design:"b-des"};
const GRP_LABEL = {Tech:"Tech", Business:"Business", Corporate:"Corporate", Design:"Design"};
const EMP_CLS   = {正社員:"b-seiin", 契約社員:"b-keiyak", 準社員:"b-jun"};

function reqHtml(req) {
  if (!req || req.length === 0) return '<span class="req-none">—</span>';
  return '<div class="req-text"><ul>' + req.map(r => `<li>${r}</li>`).join('') + '</ul></div>';
}

function buildTable(rows) {
  if (rows.length === 0) return '';
  return `<div class="tbl-wrap"><table>
    <colgroup><col class="c-grp"><col class="c-pos"><col class="c-emp"><col class="c-req"><col class="c-detail"></colgroup>
    <thead><tr><th>職種</th><th>ポジション名 / 職種</th><th>雇用形態</th><th>必須要件</th><th style="text-align:center">詳細</th></tr></thead>
    <tbody>
      ${rows.map(d => {
        const gc  = GRP_CLS[d.grp]  || 'b-etc';
        const gl  = GRP_LABEL[d.grp] || d.grp;
        const ec  = EMP_CLS[d.emp]   || 'b-seiin';
        const detailBtn = d.url
          ? `<a class="btn-detail" href="${d.url}" target="_blank" rel="noopener">求人詳細</a>`
          : `<span class="btn-detail-none">—</span>`;
        return `<tr data-corp="${d.corp}" data-grp="${d.grp}" data-emp="${d.emp}" data-nm="${d.nm}" data-req="${(d.req||[]).join(' ')}">
          <td><span class="badge ${gc}">${gl}</span></td>
          <td><div class="pos-name">${d.nm}</div><div class="pos-series">${d.sr}</div></td>
          <td><span class="badge ${ec}">${d.emp}</span></td>
          <td>${reqHtml(d.req)}</td>
          <td class="detail-cell">${d.pin ? '<span class="btn-detail-private">外部未公開</span>' : detailBtn}</td>
        </tr>`;
      }).join('')}
    </tbody>
  </table></div>`;
}

const GRP_ORDER = {Business:0, Corporate:1, Tech:2, Design:3};
const EMP_ORDER = {正社員:0, 契約社員:1, 準社員:2};

function sortData(data) {
  return [...data].sort((a, b) => {
    // pin:true는 항상 최상단
    if (a.pin && !b.pin) return -1;
    if (!a.pin && b.pin) return 1;
    const go = (GRP_ORDER[a.grp] ?? 99) - (GRP_ORDER[b.grp] ?? 99);
    if (go !== 0) return go;
    const eo = (EMP_ORDER[a.emp] ?? 99) - (EMP_ORDER[b.emp] ?? 99);
    if (eo !== 0) return eo;
    return a.sr.localeCompare(b.sr, 'ja');
  });
}

function buildSections(data) {
  const main = document.getElementById('main');
  main.innerHTML = '';
  CORPS.forEach(corp => {
    const rows = sortData(data.filter(d => d.corp === corp.id));
    const sec = document.createElement('div');
    sec.className = 'corp-section';
    sec.dataset.corp = corp.id;
    sec.innerHTML = `
      <div class="corp-header">
        <div class="corp-dot" style="background:${corp.dot}"></div>
        <div class="corp-title">${corp.label}</div>
        <div class="corp-count" id="count-${corp.id}">${rows.length}件</div>
      </div>
      ${buildTable(rows)}
    `;
    if (rows.length === 0) sec.classList.add('section-hidden');
    main.appendChild(sec);
  });
}

function filter() {
  const vc = document.getElementById('fCorp').value;
  const vg = document.getElementById('fGrp').value;
  const ve = document.getElementById('fEmp').value;
  const kw = document.getElementById('fKw').value.toLowerCase().trim();

  let total = 0;

  document.querySelectorAll('.corp-section').forEach(sec => {
    const corpId = sec.dataset.corp;
    if (vc && corpId !== vc) { sec.classList.add('section-hidden'); return; }

    const rows = sec.querySelectorAll('tbody tr');
    let visible = 0;
    rows.forEach(tr => {
      const grpOk = !vg || tr.dataset.grp === vg;
      const empOk = !ve || tr.dataset.emp === ve;
      const kwOk  = !kw || tr.dataset.nm.toLowerCase().includes(kw) || tr.dataset.req.toLowerCase().includes(kw);
      if (grpOk && empOk && kwOk) {
        tr.classList.remove('hidden');
        visible++;
      } else {
        tr.classList.add('hidden');
      }
    });

    const countEl = document.getElementById('count-' + corpId);
    if (countEl) countEl.textContent = visible + '件';
    sec.classList.toggle('section-hidden', visible === 0);
    total += visible;
  });

  document.getElementById('cnt').textContent = total + '件';
  document.getElementById('noResult').classList.toggle('hidden', total > 0);
}

// init
buildSections(DATA);
document.getElementById('cnt').textContent = DATA.length + '件';

['fCorp','fGrp','fEmp'].forEach(id => document.getElementById(id).addEventListener('change', filter));
document.getElementById('fKw').addEventListener('input', filter);
</script>
